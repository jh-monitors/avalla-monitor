name: Avalla AC Monitor

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:
    inputs:
      send_test_notification:
        description: "Send a Discord test notification instead of checking Avalla"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: avalla-ac-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Download repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Avalla and notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TEST_NOTIFICATION: ${{ inputs.send_test_notification || 'false' }}
        run: python monitor.py

      - name: Save monitor state when it changed
        if: ${{ inputs.send_test_notification != true }}
        run: |
          if git diff --quiet -- state.json; then
            echo "No state change to save."
            exit 0
          fi

          git config user.name "avalla-monitor[bot]"
          git config user.email "avalla-monitor[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "Update Avalla monitor state"
          git push
